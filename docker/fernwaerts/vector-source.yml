# Fernwaerts-specific portion of vector.yml.
#
# At build time the Dockerfile concatenates this file with everything from
# `  router:` onward in the upstream vector.yml. The result is the runtime
# /etc/vector/vector.yml — the router, all downstream transforms, and all
# sinks come from upstream verbatim; only the source + project_logs change.
#
# Why this differs from upstream:
# - Services run as s6 longruns inside this container, so there's no Docker
#   daemon to query. We tail s6's per-service log dirs instead.
# - project_logs derives .appname from the file path (matching upstream's
#   "supabase-<svc>" convention) so the router's appname checks still work.

api:
  enabled: true
  address: 127.0.0.1:9001

sources:
  s6_logs:
    type: file
    include:
      - /var/log/auth/current
      - /var/log/rest/current
      - /var/log/functions/current
      - /var/log/powersync/current
      - /var/log/meta/current
      - /var/log/analytics/current
      - /var/log/studio/current
      - /var/log/kong/current
      - /var/log/db/current
    read_from: end
    fingerprint:
      strategy: device_and_inode

transforms:
  project_logs:
    type: remap
    inputs:
      - s6_logs
    source: |-
      .project = "default"
      .event_message = del(.message)
      parsed, err = parse_regex(.file, r'^/var/log/(?P<svc>[^/]+)/current$')
      if err == null {
          .appname = "supabase-" + parsed.svc
      } else {
          .appname = "supabase-unknown"
      }
      del(.file)
      del(.host)
      del(.source_type)
