name: Run e2e tests

on:
  pull_request:
    branches: [main]
    paths:
      - app/**
      - supabase/**
      - .github/workflows/run_e2e.yaml

  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      build_backend_images: ${{ steps.detect.outputs.build_backend_images }}
      image_version: ${{ steps.detect.outputs.image_version }}

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend image changes
        id: detect
        run: |
          set -euo pipefail

          build_backend_images=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            build_backend_images=true
          else
            git diff --name-only \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.sha }}" > changed-files.txt

            if grep -Eq '^(supabase/|\.github/workflows/run_e2e\.yaml$)' changed-files.txt; then
              build_backend_images=true
            fi
          fi

          if [[ "$build_backend_images" == "true" ]]; then
            image_version="${{ github.sha }}"
          else
            image_version="latest"
          fi

          echo "build_backend_images=$build_backend_images" >> "$GITHUB_OUTPUT"
          echo "image_version=$image_version" >> "$GITHUB_OUTPUT"

  build_backend_images:
    needs: changes
    if: needs.changes.outputs.build_backend_images == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e2e app backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: supabase/docker/fernwaerts/Dockerfile
          platforms: linux/amd64
          tags: ghcr.io/ton-an/fernwaerts:${{ needs.changes.outputs.image_version }}
          outputs: type=docker,dest=/tmp/fernwaerts.tar
          cache-from: type=gha,scope=fernwaerts
          cache-to: type=gha,scope=fernwaerts,mode=max

      - name: Build e2e postgres image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: supabase/docker/fernwaerts-postgres/Dockerfile
          platforms: linux/amd64
          tags: ghcr.io/ton-an/fernwaerts-postgres:${{ needs.changes.outputs.image_version }}
          outputs: type=docker,dest=/tmp/fernwaerts-postgres.tar
          cache-from: type=gha,scope=fernwaerts-postgres
          cache-to: type=gha,scope=fernwaerts-postgres,mode=max

      - name: Upload backend images
        uses: actions/upload-artifact@v4
        with:
          name: e2e-backend-images
          path: |
            /tmp/fernwaerts.tar
            /tmp/fernwaerts-postgres.tar
          retention-days: 1

  e2e:
    needs: [changes, build_backend_images]
    if: |
      always()
      && needs.changes.result == 'success'
      && (needs.build_backend_images.result == 'success' || needs.build_backend_images.result == 'skipped')
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Download backend images
        if: needs.changes.outputs.build_backend_images == 'true'
        uses: actions/download-artifact@v4
        with:
          name: e2e-backend-images
          path: /tmp/e2e-backend-images

      - name: Load backend images
        if: needs.changes.outputs.build_backend_images == 'true'
        run: |
          set -euo pipefail

          docker load --input /tmp/e2e-backend-images/fernwaerts.tar
          docker load --input /tmp/e2e-backend-images/fernwaerts-postgres.tar

      - name: Log in to GitHub Container Registry
        if: needs.changes.outputs.build_backend_images != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install and set Flutter version
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore packages
        working-directory: ./app
        run: flutter pub get

      - name: Generate build runner files
        working-directory: ./app
        run: flutter pub run build_runner build

      - name: Run e2e suite
        uses: reactivecircus/android-emulator-runner@v2
        env:
          FLAVOR: development
          FERNWAERTS_VERSION: ${{ needs.changes.outputs.image_version }}
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            set -euo pipefail

            device_id="$(adb devices | awk 'NR > 1 && $2 == "device" { print $1; exit }')"
            if [ -z "$device_id" ]; then
              echo "No Android emulator device found" >&2
              adb devices >&2
              exit 1
            fi
            bash app/tool/run_e2e.sh --platform android -d "$device_id"
