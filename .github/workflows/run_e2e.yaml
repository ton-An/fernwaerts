name: Run e2e tests

on:
  pull_request:
    branches: [main]
    paths:
      - app/**
      - supabase/**
      - .github/workflows/run_e2e.yaml

  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      build_backend_images: ${{ steps.detect.outputs.build_backend_images }}
      image_version: ${{ steps.detect.outputs.image_version }}

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend image changes
        id: detect
        run: |
          set -euo pipefail

          build_backend_images=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            build_backend_images=true
          else
            git diff --name-only \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.sha }}" > changed-files.txt

            if grep -Eq '^(supabase/|\.github/workflows/run_e2e\.yaml$)' changed-files.txt; then
              build_backend_images=true
            fi
          fi

          if [[ "$build_backend_images" == "true" ]]; then
            image_version="${{ github.sha }}"
          else
            image_version="latest"
          fi

          echo "build_backend_images=$build_backend_images" >> "$GITHUB_OUTPUT"
          echo "image_version=$image_version" >> "$GITHUB_OUTPUT"

  build_backend_images:
    needs: changes
    if: needs.changes.outputs.build_backend_images == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push e2e app backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: supabase/docker/fernwaerts/Dockerfile
          platforms: linux/amd64
          tags: ghcr.io/ton-an/fernwaerts:${{ github.sha }}
          push: true
          cache-from: type=gha,scope=fernwaerts
          cache-to: type=gha,scope=fernwaerts,mode=max

      - name: Build and push e2e postgres image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: supabase/docker/fernwaerts-postgres/Dockerfile
          platforms: linux/amd64
          tags: ghcr.io/ton-an/fernwaerts-postgres:${{ github.sha }}
          push: true
          cache-from: type=gha,scope=fernwaerts-postgres
          cache-to: type=gha,scope=fernwaerts-postgres,mode=max

  e2e:
    needs: [changes, build_backend_images]
    if: |
      always()
      && needs.changes.result == 'success'
      && (needs.build_backend_images.result == 'success' || needs.build_backend_images.result == 'skipped')
    runs-on: macos-26-intel
    timeout-minutes: 45

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Set up Docker
        uses: docker/setup-docker-action@v5
        env:
          LIMA_START_ARGS: --cpus 4 --memory 8

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install and set Flutter version
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore packages
        working-directory: ./app
        run: flutter pub get

      - name: Generate build runner files
        working-directory: ./app
        run: flutter pub run build_runner build

      - name: Boot iOS simulator
        run: |
          set -euo pipefail

          runtime_id="$(xcrun simctl list runtimes available \
            | awk -F ' - ' '/iOS 26/ { print $NF; exit }')"
          if [ -z "$runtime_id" ]; then
            runtime_id="$(xcrun simctl list runtimes available \
              | awk -F ' - ' '/iOS / { print $NF; exit }')"
          fi

          device_type="$(xcrun simctl list devicetypes \
            | awk -F '[()]' '/iPhone 17 / { print $2; exit }')"
          if [ -z "$device_type" ]; then
            device_type="$(xcrun simctl list devicetypes \
              | awk -F '[()]' '/iPhone 16 / { print $2; exit }')"
          fi
          if [ -z "$device_type" ]; then
            device_type="$(xcrun simctl list devicetypes \
              | awk -F '[()]' '/iPhone/ { print $2; exit }')"
          fi

          simulator_id="$(xcrun simctl create "Fernwaerts E2E" \
            "$device_type" "$runtime_id")"
          xcrun simctl boot "$simulator_id"
          xcrun simctl bootstatus "$simulator_id" -b
          echo "SIMULATOR_ID=$simulator_id" >> "$GITHUB_ENV"

      - name: Run e2e suite
        env:
          FLAVOR: Development
          FERNWAERTS_VERSION: ${{ needs.changes.outputs.image_version }}
        run: >
          bash app/tool/run_e2e.sh
          -d "$SIMULATOR_ID"
          --dart-define=E2E_SERVER_URL=http://127.0.0.1:8000
          --dart-define=E2E_MAILPIT_URL=http://127.0.0.1:8025
